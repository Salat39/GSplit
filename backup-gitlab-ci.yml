buildInternal:
  stage: build
  script:
    - ./gradlew clean assembleInternal
  retry: 2
  artifacts:
    expire_in: 1 week
    name: "${CI_PROJECT_NAME}_${CI_COMMIT_REF_NAME}_${BUILD_NUMBER}"
    paths:
      - app/build/outputs/apk/internal/*.apk
  tags:
    - android
  only:
    - main

